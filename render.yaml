services:
  - type: web
    name: oltin-baliq-web
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/oltin_baliq.db
      - key: WEBAPP_URL
        value: https://karakul-bot.onrender.com
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  - type: worker
    name: oltin-baliq-bot
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    dockerCommand: python bot/main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./data/oltin_baliq.db
      - key: WEBAPP_URL
        value: https://karakul-bot.onrender.com
