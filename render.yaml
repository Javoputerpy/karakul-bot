services:
  - type: web
    name: oltin-baliq-all
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run_all.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false # Set this to your Render URL: https://oltin-baliq-all.onrender.com
    disk:
      name: oltin-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
